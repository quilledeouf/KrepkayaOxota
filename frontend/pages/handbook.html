<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Крепкая Охота — справочник</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="../css/styles.css" />
</head>
<body>
  <header id="appHeader" class="site-header"></header>

  <main>
    <div class="container section">
      <h1 class="page-title">Справочник</h1>
      <p class="page-sub">Всё о рыбах, животных и птицах Ростовской области — сроки и ограничения по сезонам.</p>

      <div class="tabs" id="tabs"></div>

      <div class="toolbar">
        <div class="input-wrap">
          <span id="searchIcon"></span>
          <input id="search" class="input" type="text" placeholder="Поиск по названию…" autocomplete="off" />
        </div>
      </div>

      <div class="legend">
        <span><i style="background:#1a9d4e"></i> открыто</span>
        <span><i style="background:#d8412f"></i> закрыто / запрет</span>
        <span>Вес · Лет · Осе · Зим — сезоны</span>
      </div>

      <div id="cards" class="card-grid"></div>
    </div>
  </main>

  <footer id="appFooter" class="site-footer"></footer>

  <script src="../js/data.js"></script>
  <script src="../js/api.js"></script>
  <script src="../js/components.js"></script>
  <script src="../js/handbook.js"></script>
</body>
</html>
